name: CI

on: [push, pull_request]
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # 4.3.1
              with:
                fetch-depth: 0

            - name: Set node version
              run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

            - name: Install nodejs
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
              with:
                node-version: ${{ env.NODE_VERSION }}
            
            - name: Install node dependencies
              run: npm ci --ignore-scripts --engine-strict

            - name: Run linting
              run: npm run lint

            - name: Run unit tests
              run: |
                npm run unit-test

            - name: Analyse code quality
              uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 #7.0.0
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              with:
                args: >
                  -Dsonar.organization=defra
                  -Dsonar.projectKey=DEFRA_flood-data
                  -Dsonar.exclusions=**/node_modules/**,**/test/**,**/test-output/**,**/queries.js
                  -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
                  -Dsonar.javascript.exclusions=**/node_modules/**,**/test/**,**/test-output/**,**/queries.js
            - name: Dependency Review
              if: github.event_name == 'pull_request'
              uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # 5.0.0
              with:
                fail-on-severity: moderate
                comment-summary-in-pr: always
                                  
